<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NZ Animal Harm Map</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #F0EEE8; color: #9DBFBF; }

    header {
      background: #9DBFBF;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 4px solid #E5421F;
      flex-wrap: wrap;
    }
    .header-text { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
    header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: #F0EEE8;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    header h1 span { color: #E5421F; }
    header p {
      font-size: 12px;
      color: #3e5454;
      letter-spacing: 0.5px;
      padding-bottom: 3px;
    }
    .report-btn {
      background: #E5421F;
      color: #F0EEE8;
      text-decoration: none;
      font-family: 'Oswald', sans-serif;
      font-size: 15px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 10px 20px;
      border-radius: 2px;
      white-space: nowrap;
    }
    .report-btn:hover { background: #c23311; }

    #controls {
      padding: 12px 24px;
      background: #9DBFBF;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .filter-btn {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 2px;
      border: 1px solid #3e5454;
      background: transparent;
      color: #3e5454;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: #E5421F;
      color: #F0EEE8;
      border-color: #E5421F;
    }
    .filter-btn:hover:not(.active) {
      border-color: #F0EEE8;
      color: #F0EEE8;
    }

    #stat-bar {
      padding: 12px 24px;
      background: #F0EEE8;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      border-bottom: 1px solid #d4d0c8;
    }
    .stat {
      background: #fff;
      border-radius: 2px;
      padding: 8px 16px;
      border-left: 3px solid #4A6E7E;
    }
    .stat span {
      font-family: 'Oswald', sans-serif;
      font-size: 22px;
      font-weight: 700;
      display: block;
      color: #4A6E7E;
    }
    .stat label { color: #8a9a8a; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat.alert { border-left-color: #E5421F; }
    .stat.alert span { color: #E5421F; }

    #status {
      padding: 5px 24px;
      font-size: 11px;
      color: #9aaa9a;
      background: #F0EEE8;
      letter-spacing: 0.3px;
    }

    #map { width: 100%; height: calc(100vh - 210px); min-height: 400px; }

    .legend {
      background: #9DBFBF;
      border: none;
      border-radius: 2px;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 2;
    }
    .legend-row { display: flex; align-items: center; gap: 8px; color: #F0EEE8; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; font-size: 11px; }
    .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  </style>
</head>
<body>

<header>
  <div class="header-text">
    <h1>NZ <span>Animal</span> Harm Map</h1>
    <p>Community-reported incidents of intentional animal harm in Aotearoa</p>
  </div>
  <a href="submit.html" class="report-btn">+ Report an incident</a>
</header>
<div id="controls"></div>
<div id="stat-bar"></div>
<div id="status">Loading data...</div>
<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script>
const SHEET_ID = '116C4Ynu28-tN0gmAIYA145yfrINfFrGwezaAbl1QPbM';
const JSON_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=Sheet1';

const METHODS = {
  shot:     { color: '#C0392B', label: 'Shot' },
  beaten:   { color: '#8B5A2B', label: 'Beaten' },
  trapped:  { color: '#B8860B', label: 'Trapped' },
  drowned:  { color: '#2E6E8E', label: 'Drowned' },
  burnt:    { color: '#E67E22', label: 'Burnt' },
  rundown:  { color: '#7F8C8D', label: 'Run down' },
  hung:     { color: '#5D4E8C', label: 'Hung' },
  mauled:   { color: '#9B2D6B', label: 'Mauled' },
  stolen:   { color: '#2E8B57', label: 'Stolen' },
  poison:   { color: '#1a1a1a', label: 'Poison' },
  other:    { color: '#566573', label: 'Other' }
};

var allData = [];
var clusterGroup;

var leafletMap = L.map('map', { center: [-41.3, 172.5], zoom: 6 });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors'
}).addTo(leafletMap);

var legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  var d = L.DomUtil.create('div', 'legend');
  d.innerHTML = Object.entries(METHODS).map(function(e) {
    return '<div class="legend-row"><span class="dot" style="background:' + e[1].color + '"></span>' + e[1].label + '</div>';
  }).join('')
  + '<div style="border-top:1px solid rgba(255,255,255,0.25);margin-top:8px;padding-top:8px">'
  + '<div class="legend-row"><span class="dot" style="background:#566573"></span>Deceased</div>'
  + '<div class="legend-row"><span class="dot" style="background:rgba(255,255,255,0.9);border:3px solid #566573;box-sizing:border-box"></span>Survived</div>'
  + '</div>';
  return d;
};
legend.addTo(leafletMap);

clusterGroup = L.markerClusterGroup({ maxClusterRadius: 40 });
leafletMap.addLayer(clusterGroup);

function parseGviz(text) {
  var json = JSON.parse(text.replace(/^[^{]*/, '').replace(/[^}]*$/, ''));
  var cols = json.table.cols.map(function(c) { return c.label.toLowerCase().trim(); });
  return json.table.rows.map(function(row) {
    var obj = {};
    cols.forEach(function(col, i) {
      var cell = row.c[i];
      obj[col] = cell && cell.v !== null ? String(cell.v) : '';
    });
    return obj;
  }).filter(function(r) { return r.id || r.address || r.suburb; });
}

function normaliseMethod(m) {
  if (!m) return 'other';
  var s = m.toLowerCase();
  if (s.includes('poison') || s.includes('1080') || s.includes('bait')) return 'poison';
  if (s.includes('shot') || s.includes('shoot') || s.includes('gun') || s.includes('arrow')) return 'shot';
  if (s.includes('trap')) return 'trapped';
  if (s.includes('drown')) return 'drowned';
  if (s.includes('burn') || s.includes('burnt') || s.includes('fire')) return 'burnt';
  if (s.includes('run') || s.includes('car') || s.includes('vehicle')) return 'rundown';
  if (s.includes('hung') || s.includes('hang') || s.includes('hanged')) return 'hung';
  if (s.includes('maul') || s.includes('dog attack') || s.includes('attacked')) return 'mauled';
  if (s.includes('stol') || s.includes('steal') || s.includes('taken') || s.includes('theft')) return 'stolen';
  if (s.includes('beat') || s.includes('hit') || s.includes('stab') || s.includes('kick')) return 'beaten';
  return 'other';
}

function normaliseStatus(s) {
  if (!s) return '';
  var t = s.toLowerCase();
  if (t.includes('surviv') || t.includes('alive')) return 'survived';
  if (t.includes('decease') || t.includes('dead') || t.includes('died') || t.includes('killed')) return 'deceased';
  return '';
}

function makeIcon(method, status) {
  var c = (METHODS[method] || METHODS.other).color;
  var inner;
  if (status === 'survived') {
    // hollow ring = the animal survived
    inner = '<div style="width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.9);border:3px solid ' + c + ';box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>';
  } else {
    // solid dot = deceased (or unknown)
    inner = '<div style="width:14px;height:14px;border-radius:50%;background:' + c + ';border:2px solid rgba(255,255,255,0.9);box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>';
  }
  return L.divIcon({ className: '', html: inner, iconSize: [14,14], iconAnchor: [7,7] });
}

function renderStats(data) {
  var counts = {};
  data.forEach(function(d) { counts[d.method] = (counts[d.method]||0)+1; });
  document.getElementById('stat-bar').innerHTML =
    '<div class="stat alert"><span>' + data.length + '</span><label>Total reports</label></div>' +
    Object.entries(counts).map(function(e) {
      return '<div class="stat"><span style="color:' + (METHODS[e[0]]||METHODS.other).color + '">' + e[1] + '</span><label>' + (METHODS[e[0]]||{label:e[0]}).label + '</label></div>';
    }).join('');
}

function renderPins(data) {
  renderStats(data);
  clusterGroup.clearLayers();
  data.forEach(function(d) {
    var marker = L.marker([d.lat, d.lng], { icon: makeIcon(d.method, d.statusKey) });
    var animal = d.animal_type ? d.animal_type.charAt(0).toUpperCase() + d.animal_type.slice(1) : 'Unknown';
    var statusLine = '';
    if (d.statusKey === 'survived') {
      statusLine = '<span style="color:#2E8B57;font-size:12px;font-weight:bold">● Survived</span><br>';
    } else if (d.statusKey === 'deceased') {
      statusLine = '<span style="color:#C0392B;font-size:12px;font-weight:bold">● Deceased</span><br>';
    }
    marker.bindPopup(
      '<b style="color:' + (METHODS[d.method]||METHODS.other).color + '">' + (METHODS[d.method]||{label:d.method}).label + '</b><br>' +
      statusLine +
      '<b>' + animal + '</b> · ' + (d.date||'') + '<br>' +
      '<span style="color:#888;font-size:12px">' + (d.address||d.suburb||'') + (d.region ? ', ' + d.region : '') + '</span>' +
      (d.description ? '<p style="margin:6px 0 0;font-size:13px">' + d.description + '</p>' : '')
    );
    clusterGroup.addLayer(marker);
  });
}

function renderFilters(data) {
  var used = [...new Set(data.map(function(d) { return d.method; }))];
  var el = document.getElementById('controls');
  el.innerHTML = ['all'].concat(used).map(function(m) {
    return '<button class="filter-btn ' + (m==='all'?'active':'') + '" data-method="' + m + '">' + (m==='all'?'All':(METHODS[m]||{label:m}).label) + '</button>';
  }).join('');
  el.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      el.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      var m = btn.dataset.method;
      renderPins(m === 'all' ? allData : allData.filter(function(d) { return d.method === m; }));
    });
  });
}

async function loadSheet() {
  var status = document.getElementById('status');
  try {
    var r = await fetch(JSON_URL);
    if (!r.ok) throw new Error('Sheet not accessible');
    var text = await r.text();
    var rows = parseGviz(text);
    if (rows.length === 0) {
      status.textContent = 'No reports yet — add data to your Google Sheet to see pins appear.';
      return;
    }
    var resolved = [];
    for (var i = 0; i < rows.length; i++) {
      var row = rows[i];
      var lat = parseFloat(row.lat), lng = parseFloat(row.lng);
      if (lat && lng) {
        resolved.push(Object.assign({}, row, { lat: lat, lng: lng, method: normaliseMethod(row.method), statusKey: normaliseStatus(row.status) }));
      }
    }
    allData = resolved;
    var skipped = rows.length - allData.length;
    status.textContent = allData.length + ' report(s) loaded'
      + (skipped > 0 ? ' (' + skipped + ' awaiting coordinates)' : '')
      + '. Last updated: ' + new Date().toLocaleTimeString();
    renderFilters(allData);
    renderPins(allData);
  } catch(e) {
    status.textContent = 'Could not load sheet. Make sure sharing is set to "Anyone with the link can view".';
    console.error(e);
  }
}

loadSheet();
</script>
</body>
</html>
