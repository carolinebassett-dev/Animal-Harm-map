bash

cat > /mnt/user-data/outputs/index.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NZ Animal Harm Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f9f9f7; color: #222; }
    header { padding: 14px 20px; background: #fff; border-bottom: 1px solid #e5e5e5; }
    header h1 { font-size: 17px; font-weight: 600; }
    header p { font-size: 13px; color: #666; margin-top: 2px; }
    #controls { padding: 12px 20px; background: #fff; border-bottom: 1px solid #e5e5e5; display: flex; flex-wrap: wrap; gap: 8px; }
    .filter-btn { font-size: 13px; padding: 5px 14px; border-radius: 20px; border: 1px solid #ddd; background: #fff; color: #555; cursor: pointer; }
    .filter-btn.active { background: #222; color: #fff; border-color: #222; }
    #stat-bar { padding: 10px 20px; background: #f2f2f0; display: flex; flex-wrap: wrap; gap: 10px; }
    .stat { background: #fff; border-radius: 8px; padding: 7px 14px; border: 1px solid #e5e5e5; }
    .stat span { font-size: 18px; font-weight: 600; display: block; }
    .stat label { color: #888; font-size: 12px; }
    #status { padding: 6px 20px; font-size: 12px; color: #888; background: #f9f9f7; }
    #map { width: 100%; height: calc(100vh - 200px); min-height: 400px; }
    .legend { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 13px; line-height: 2; }
    .legend-row { display: flex; align-items: center; gap: 8px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  </style>
</head>
<body>

<header>
  <h1>NZ Animal Harm Map</h1>
  <p>Community-reported incidents of intentional animal harm in New Zealand</p>
</header>
<div id="controls"></div>
<div id="stat-bar"></div>
<div id="status">Loading data...</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
const SHEET_ID = '1xrwxrhoQRIShSz1SHsbrtnX4AA_cblp9_fja8yXDHNY';
const JSON_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=Sheet1';

const METHODS = {
  poison:   { color: '#1a1a1a', label: 'Poison' },
  shooting: { color: '#cc2200', label: 'Shooting' },
  runover:  { color: '#888888', label: 'Run over' },
  drowning: { color: '#5ba8d4', label: 'Drowning' },
  beating:  { color: '#8B4513', label: 'Beating' },
  other:    { color: '#9b59b6', label: 'Other' }
};

var allData = [];
var clusterGroup;

var leafletMap = L.map('map', { center: [-41.3, 172.5], zoom: 6 });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors'
}).addTo(leafletMap);

var legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  var d = L.DomUtil.create('div', 'legend');
  d.innerHTML = Object.entries(METHODS).map(function(e) {
    return '<div class="legend-row"><span class="dot" style="background:' + e[1].color + '"></span>' + e[1].label + '</div>';
  }).join('');
  return d;
};
legend.addTo(leafletMap);

clusterGroup = L.markerClusterGroup({ maxClusterRadius: 40 });
leafletMap.addLayer(clusterGroup);

function parseGviz(text) {
  var json = JSON.parse(text.replace(/^[^{]*/, '').replace(/[^}]*$/, ''));
  var cols = json.table.cols.map(function(c) { return c.label.toLowerCase().trim(); });
  return json.table.rows.map(function(row) {
    var obj = {};
    cols.forEach(function(col, i) {
      var cell = row.c[i];
      obj[col] = cell && cell.v !== null ? String(cell.v) : '';
    });
    return obj;
  }).filter(function(r) { return r.id || r.address || r.suburb; });
}

function geocode(address, cb) {
  var url = 'https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(address + ', New Zealand') + '&format=json&limit=1';
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) { cb(d.length ? { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon) } : null); })
    .catch(function() { cb(null); });
}

function normaliseMethod(m) {
  if (!m) return 'other';
  var s = m.toLowerCase();
  if (s.includes('poison') || s.includes('1080') || s.includes('bait')) return 'poison';
  if (s.includes('shoot') || s.includes('shot') || s.includes('gun') || s.includes('arrow')) return 'shooting';
  if (s.includes('run') || s.includes('car') || s.includes('vehicle')) return 'runover';
  if (s.includes('drown')) return 'drowning';
  if (s.includes('beat') || s.includes('hit') || s.includes('stab') || s.includes('kick')) return 'beating';
  return 'other';
}

function makeIcon(method) {
  var c = (METHODS[method] || METHODS.other).color;
  return L.divIcon({
    className: '',
    html: '<div style="width:14px;height:14px;border-radius:50%;background:' + c + ';border:2px solid rgba(255,255,255,0.9);box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>',
    iconSize: [14,14], iconAnchor: [7,7]
  });
}

function renderStats(data) {
  var counts = {};
  data.forEach(function(d) { counts[d.method] = (counts[d.method]||0)+1; });
  document.getElementById('stat-bar').innerHTML =
    '<div class="stat"><span>' + data.length + '</span><label>Total reports</label></div>' +
    Object.entries(counts).map(function(e) {
      return '<div class="stat"><span style="color:' + (METHODS[e[0]]||METHODS.other).color + '">' + e[1] + '</span><label>' + (METHODS[e[0]]||{label:e[0]}).label + '</label></div>';
    }).join('');
}

function renderPins(data) {
  renderStats(data);
  clusterGroup.clearLayers();
  data.forEach(function(d) {
    var marker = L.marker([d.lat, d.lng], { icon: makeIcon(d.method) });
    var animal = d.animal_type ? d.animal_type.charAt(0).toUpperCase() + d.animal_type.slice(1) : 'Unknown';
    marker.bindPopup(
      '<b style="color:' + (METHODS[d.method]||METHODS.other).color + '">' + (METHODS[d.method]||{label:d.method}).label + '</b><br>' +
      '<b>' + animal + '</b> · ' + (d.date||'') + '<br>' +
      '<span style="color:#888;font-size:12px">' + (d.address||d.suburb||'') + (d.region ? ', ' + d.region : '') + '</span>' +
      (d.description ? '<p style="margin:6px 0 0;font-size:13px">' + d.description + '</p>' : '')
    );
    clusterGroup.addLayer(marker);
  });
}

function renderFilters(data) {
  var used = [...new Set(data.map(function(d) { return d.method; }))];
  var el = document.getElementById('controls');
  el.innerHTML = ['all'].concat(used).map(function(m) {
    return '<button class="filter-btn ' + (m==='all'?'active':'') + '" data-method="' + m + '">' + (m==='all'?'All':(METHODS[m]||{label:m}).label) + '</button>';
  }).join('');
  el.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      el.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      var m = btn.dataset.method;
      renderPins(m === 'all' ? allData : allData.filter(function(d) { return d.method === m; }));
    });
  });
}

async function loadSheet() {
  var status = document.getElementById('status');
  try {
    var r = await fetch(JSON_URL);
    if (!r.ok) throw new Error('Sheet not accessible');
    var text = await r.text();
    var rows = parseGviz(text);
    if (rows.length === 0) {
      status.textContent = 'No reports yet — add data to your Google Sheet to see pins appear.';
      return;
    }
    status.textContent = 'Geocoding ' + rows.length + ' report(s)...';
    var resolved = [];
    for (var i = 0; i < rows.length; i++) {
      var row = rows[i];
      var lat = parseFloat(row.lat), lng = parseFloat(row.lng);
      if (!lat || !lng) {
        var query = row.address || (row.suburb && row.region ? row.suburb + ', ' + row.region : row.suburb || row.region || '');
        if (query) {
          await new Promise(function(resolve) {
            geocode(query, function(geo) {
              if (geo) { lat = geo.lat; lng = geo.lng; }
              resolve();
            });
          });
        }
      }
      if (lat && lng) {
        resolved.push(Object.assign({}, row, { lat: lat, lng: lng, method: normaliseMethod(row.method) }));
      }
    }
    allData = resolved;
    status.textContent = allData.length + ' of ' + rows.length + ' report(s) loaded. Last updated: ' + new Date().toLocaleTimeString();
    renderFilters(allData);
    renderPins(allData);
  } catch(e) {
    status.textContent = 'Could not load sheet. Make sure sharing is set to "Anyone with the link can view".';
    console.error(e);
  }
}

loadSheet();
</script>
</body>
</html>
EOF
